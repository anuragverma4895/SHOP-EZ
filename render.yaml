services:
  # 1. Backend Service
  - type: web
    name: shop-ez-backend
    env: node
    plan: free
    buildCommand: npm run install-backend
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromContext: frontend_url
      - key: AI_SERVICE_URL
        fromContext: ai_service_url

  # 2. AI Service
  - type: web
    name: shop-ez-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: ai_service

  # 3. Frontend Service (Fixed for Render Blueprint)
  - type: web
    name: shop-ez-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromContext: backend_url

envVarGroups:
  - name: shop-ez-configs
    envVars:
      - key: backend_url
        fromService:
          name: shop-ez-backend
          type: web
          property: host
      - key: frontend_url
        fromService:
          name: shop-ez-frontend
          type: web
          property: host
      - key: ai_service_url
        fromService:
          name: shop-ez-ai
          type: web
          property: host
