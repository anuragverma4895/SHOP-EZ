services:
  # 1. Backend Service (Node.js)
  - type: web
    name: shop-ez-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromContext: frontend_url
      - key: AI_SERVICE_URL
        fromContext: ai_service_url

  # 2. AI Service (Python)
  - type: web
    name: shop-ez-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: ai_service
    envVars:
      - key: PORT
        value: 10000

  # 3. Frontend Service (Static Site)
  - type: static
    name: shop-ez-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromContext: backend_url

# Define context variables to link services
envVarGroups:
  - name: shop-ez-configs
    envVars:
      - key: backend_url
        fromService:
          name: shop-ez-backend
          type: web
          property: host
      - key: frontend_url
        fromService:
          name: shop-ez-frontend
          type: static
          property: host
      - key: ai_service_url
        fromService:
          name: shop-ez-ai
          type: web
          property: host
