services:
  # 1. Backend Service
  - type: web
    name: shop-ez-backend
    env: node
    plan: free
    buildCommand: "npm install && cd backend && npm install"
    startCommand: "node index.js"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: shop-ez-frontend
          property: host

  # 2. Frontend Service
  - type: web
    name: shop-ez-frontend
    runtime: static
    plan: free
    buildCommand: "npm install && cd frontend && npm install && npm run build"
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: shop-ez-backend
          property: host
